name: Deploy ToolCity to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Enables GitHub Pages for the repo automatically on first run.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      # Project pages are served from /<repo>/, so bake that into the links.
      - run: npm run build
        env:
          TOOLCITY_BASE_PATH: /toolcity
      - run: touch toolcity/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: toolcity

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
