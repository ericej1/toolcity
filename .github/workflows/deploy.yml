name: Deploy ToolCity to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Project pages are served from /<repo>/, so bake that into the links.
      # TOOLCITY_API_BASE (a repo variable) points the client at the deployed
      # Cloudflare Worker for shared guestbooks; empty = per-browser localStorage.
      - run: npm run build
        env:
          TOOLCITY_BASE_PATH: /toolcity
          TOOLCITY_API_BASE: ${{ vars.TOOLCITY_API_BASE }}
      - run: touch toolcity/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: toolcity

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
